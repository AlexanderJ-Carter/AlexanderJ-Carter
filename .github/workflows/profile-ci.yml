name: Profile CI

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - SECURITY.md
      - GOVERNANCE.md
      - assets/**
      - docs/**
      - .github/**
      - .markdownlint.json
  pull_request:
    branches:
      - main
    paths:
      - README.md
      - SECURITY.md
      - GOVERNANCE.md
      - assets/**
      - docs/**
      - .github/**
      - .markdownlint.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: profile-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: |
            README.md
            SECURITY.md
            GOVERNANCE.md
            docs/**/*.md
            .github/**/*.md

  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1.7.12

  readme-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate local README assets
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t refs < <(grep -oE '\./assets/[A-Za-z0-9._/-]+\.svg' README.md | sort -u)
          if [ "${#refs[@]}" -eq 0 ]; then
            echo "README.md references no local ./assets/*.svg files" >&2
            exit 1
          fi
          for ref in "${refs[@]}"; do
            if [ ! -f "${ref#./}" ]; then
              echo "Missing asset referenced by README: $ref" >&2
              exit 1
            fi
          done
          while IFS= read -r -d '' asset; do
            if ! grep -qF "./${asset}" README.md; then
              echo "Orphan asset not referenced by README: ${asset}" >&2
              exit 1
            fi
          done < <(find assets -type f -name '*.svg' -print0)
