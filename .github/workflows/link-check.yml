name: Link Check

on:
  push:
    branches:
      - main
    paths:
      - README.md
      - SECURITY.md
      - GOVERNANCE.md
      - .github/**/*.md
      - .lycheeignore
  pull_request:
    branches:
      - main
    paths:
      - README.md
      - SECURITY.md
      - GOVERNANCE.md
      - .github/**/*.md
      - .lycheeignore
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: link-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    if: github.repository == 'AlexanderJ-Carter/AlexanderJ-Carter'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,429
            --max-concurrency 8
            --max-retries 3
            --retry-wait-time 5
            --timeout 20
            --exclude-file .lycheeignore
            README.md SECURITY.md GOVERNANCE.md .github/**/*.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
