name: PR Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    if: github.repository == 'AlexanderJ-Carter/AlexanderJ-Carter'
    runs-on: ubuntu-latest
    steps:
      - name: Auto label PR by file paths
        uses: actions/labeler@v5
