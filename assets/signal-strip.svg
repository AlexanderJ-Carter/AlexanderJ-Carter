<svg width="1200" height="172" viewBox="0 0 1200 172" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Signal strip</title>
  <desc id="desc">A compact animated strip showing current energy, open tabs, and playful status lights.</desc>
  <defs>
    <linearGradient id="bg" x1="44" y1="16" x2="1158" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="70" y1="132" x2="1132" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="0.33" stop-color="#FB7185"/>
      <stop offset="0.66" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="1184" height="156" rx="26" fill="url(#bg)" stroke="#1F2937"/>
  <text x="46" y="58" fill="#F8FAFC" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="24" font-weight="700">Open Tabs / 当前打开的标签页</text>
  <text x="48" y="98" fill="#CBD5E1" font-family="'Fira Code', monospace" font-size="18">README.md</text>
  <text x="214" y="98" fill="#94A3B8" font-family="'Fira Code', monospace" font-size="18">portfolio ideas</text>
  <text x="438" y="98" fill="#94A3B8" font-family="'Fira Code', monospace" font-size="18">linux notes</text>
  <text x="616" y="98" fill="#94A3B8" font-family="'Fira Code', monospace" font-size="18">verilog lab</text>
  <text x="792" y="98" fill="#94A3B8" font-family="'Fira Code', monospace" font-size="18">music playlist</text>

  <path d="M48 128H1134" stroke="url(#line)" stroke-width="4" stroke-linecap="round" opacity="0.34"/>
  <circle cx="198" cy="128" r="8" fill="#F97316">
    <animate attributeName="cx" values="198;428;674;944;198" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(920 36)">
    <rect x="0" y="0" width="226" height="64" rx="18" fill="#020617" opacity="0.9"/>
    <text x="18" y="25" fill="#E2E8F0" font-family="'Fira Code', monospace" font-size="15">energy_level</text>
    <text x="18" y="49" fill="#86EFAC" font-family="'Fira Code', monospace" font-size="16">steady + curious</text>
    <circle cx="184" cy="32" r="6" fill="#22C55E">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
