<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ambient lab scene</title>
  <desc id="desc">A playful animated scene with floating lights, a terminal panel, and a warm desk mood.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="36" x2="1032" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="card" x1="172" y1="84" x2="893" y2="296" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="219" y1="72" x2="903" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="0.35" stop-color="#FB7185"/>
      <stop offset="0.68" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>

  <circle cx="164" cy="90" r="54" fill="#F97316" opacity="0.12" filter="url(#blur)">
    <animate attributeName="cx" values="164;194;164" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="980" cy="82" r="68" fill="#06B6D4" opacity="0.12" filter="url(#blur)">
    <animate attributeName="cy" values="82;112;82" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1028" cy="286" r="72" fill="#FB7185" opacity="0.1" filter="url(#blur)">
    <animate attributeName="cx" values="1028;1004;1028" dur="9s" repeatCount="indefinite"/>
  </circle>

  <rect x="70" y="54" width="1060" height="252" rx="26" fill="#020617" opacity="0.4"/>
  <rect x="86" y="68" width="1028" height="224" rx="24" fill="url(#card)" stroke="rgba(148,163,184,0.18)" filter="url(#shadow)"/>
  <rect x="86" y="68" width="1028" height="224" rx="24" stroke="url(#accent)" stroke-opacity="0.28"/>

  <rect x="116" y="96" width="458" height="168" rx="18" fill="#020617" opacity="0.86"/>
  <rect x="132" y="112" width="10" height="10" rx="5" fill="#FB7185"/>
  <rect x="148" y="112" width="10" height="10" rx="5" fill="#F59E0B"/>
  <rect x="164" y="112" width="10" height="10" rx="5" fill="#22C55E"/>

  <text x="134" y="148" fill="#93C5FD" font-family="'Fira Code', monospace" font-size="21">$ whoami</text>
  <text x="134" y="178" fill="#E5E7EB" font-family="'Fira Code', monospace" font-size="19">AlexanderJ-Carter</text>
  <text x="134" y="208" fill="#93C5FD" font-family="'Fira Code', monospace" font-size="21">$ echo $MOOD</text>
  <text x="134" y="238" fill="#FDE68A" font-family="'Fira Code', monospace" font-size="19">curious, warm, still building...</text>
  <rect x="422" y="224" width="12" height="22" rx="3" fill="#E5E7EB">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <text x="626" y="140" fill="#F8FAFC" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="40" font-weight="700">A small corner on the internet</text>
  <text x="626" y="182" fill="#CBD5E1" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="21">projects, notes, experiments, and a bit of playful energy</text>
  <text x="626" y="218" fill="#FDBA74" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="22">把日子过成自己喜欢的样子</text>

  <g transform="translate(626 240)">
    <rect x="0" y="0" width="112" height="34" rx="17" fill="#172554"/>
    <rect x="122" y="0" width="110" height="34" rx="17" fill="#3F1D2E"/>
    <rect x="242" y="0" width="126" height="34" rx="17" fill="#052E2B"/>
    <text x="22" y="22" fill="#BFDBFE" font-family="'Fira Code', monospace" font-size="15">build</text>
    <text x="144" y="22" fill="#FBCFE8" font-family="'Fira Code', monospace" font-size="15">learn</text>
    <text x="264" y="22" fill="#BBF7D0" font-family="'Fira Code', monospace" font-size="15">share</text>
  </g>

  <g opacity="0.82">
    <circle cx="1038" cy="168" r="6" fill="#F97316">
      <animate attributeName="cy" values="168;152;168" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1066" cy="198" r="8" fill="#22C55E">
      <animate attributeName="cy" values="198;214;198" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="218" r="5" fill="#06B6D4">
      <animate attributeName="cx" values="1000;1014;1000" dur="4.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
