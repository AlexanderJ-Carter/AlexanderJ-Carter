<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentSociety2 featured card</title>
  <desc id="desc">A clean featured card highlighting AgentSociety2 as an LLM-driven social simulation project.</desc>
  <defs>
    <linearGradient id="bg" x1="60" y1="30" x2="1140" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="stroke" x1="132" y1="52" x2="1072" y2="242" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <rect x="54" y="36" width="1092" height="228" rx="24" fill="#0B1120" stroke="url(#stroke)" stroke-opacity="0.32" filter="url(#shadow)"/>

  <g transform="translate(96 78)">
    <rect x="0" y="0" width="196" height="112" rx="22" fill="#111827"/>
    <rect x="22" y="22" width="68" height="68" rx="18" fill="#0EA5E9" fill-opacity="0.16"/>
    <path d="M47 74L62 43L77 74" stroke="#7DD3FC" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M119 53H162" stroke="#86EFAC" stroke-width="10" stroke-linecap="round"/>
    <path d="M119 71H150" stroke="#FDE68A" stroke-width="10" stroke-linecap="round"/>
    <circle cx="154" cy="136" r="7" fill="#22C55E">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="344" y="102" fill="#E2E8F0" font-family="'Fira Code', monospace" font-size="18">Featured Collaboration</text>
  <text x="344" y="144" fill="#F8FAFC" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="42" font-weight="700">AgentSociety2</text>
  <text x="344" y="182" fill="#CBD5E1" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="22">LLM-driven social simulation for urban-scale agent research</text>
  <text x="344" y="216" fill="#94A3B8" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="18">framework · visualization · documentation · examples</text>

  <g transform="translate(344 236)">
    <rect x="0" y="0" width="112" height="34" rx="17" fill="#082F49"/>
    <rect x="126" y="0" width="110" height="34" rx="17" fill="#052E2B"/>
    <rect x="250" y="0" width="114" height="34" rx="17" fill="#3F1D2E"/>
    <text x="22" y="22" fill="#BAE6FD" font-family="'Fira Code', monospace" font-size="15">agents</text>
    <text x="150" y="22" fill="#BBF7D0" font-family="'Fira Code', monospace" font-size="15">society</text>
    <text x="274" y="22" fill="#FBCFE8" font-family="'Fira Code', monospace" font-size="15">city</text>
  </g>

  <circle cx="1088" cy="82" r="9" fill="#38BDF8" opacity="0.9">
    <animate attributeName="cy" values="82;74;82" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1052" cy="118" r="6" fill="#22C55E" opacity="0.85">
    <animate attributeName="cy" values="118;126;118" dur="3.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1116" cy="136" r="7" fill="#F97316" opacity="0.85">
    <animate attributeName="cx" values="1116;1106;1116" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
